<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .comment-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .comment-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .comment-author {
            font-weight: bold;
            margin-right: 10px;
        }
        .comment-rating {
            color: #ff9900;
        }
        .comment-time {
            color: #999;
            font-size: 12px;
            margin-left: 10px;
        }
        .comment-content {
            line-height: 1.6;
        }
        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>评论API测试 - 蒜蓉西兰花</h1>

    <div id="stats" class="stats">
        <h3>评论统计</h3>
        <p>加载中...</p>
    </div>

    <div id="comments">
        <h3>评论列表</h3>
        <p>加载中...</p>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        // 加载评论统计
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/comments/recipe/1/stats`);
                const stats = await response.json();

                document.getElementById('stats').innerHTML = `
                    <h3>评论统计</h3>
                    <p><strong>总评论数:</strong> ${stats.total_comments}</p>
                    <p><strong>平均评分:</strong> ${stats.average_rating} ⭐</p>
                    <p><strong>评分分布:</strong></p>
                    <pre>${JSON.stringify(stats.rating_distribution, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('加载统计失败:', error);
                document.getElementById('stats').innerHTML = `<p style="color: red;">加载失败: ${error.message}</p>`;
            }
        }

        // 加载评论列表
        async function loadComments() {
            try {
                const response = await fetch(`${API_BASE}/comments/recipe/1`);
                const data = await response.json();

                console.log('API返回的数据:', data);

                if (data.comments && data.comments.length > 0) {
                    const commentsHTML = data.comments.map(comment => `
                        <div class="comment-item">
                            <div class="comment-header">
                                <span class="comment-author">${comment.user?.username || '匿名用户'}</span>
                                <span class="comment-rating">${'★'.repeat(comment.rating)}${'☆'.repeat(5 - comment.rating)}</span>
                                <span class="comment-time">${new Date(comment.created_at).toLocaleString('zh-CN')}</span>
                            </div>
                            <div class="comment-content">${comment.content}</div>
                        </div>
                    `).join('');

                    document.getElementById('comments').innerHTML = `
                        <h3>评论列表 (${data.total}条)</h3>
                        ${commentsHTML}
                    `;
                } else {
                    document.getElementById('comments').innerHTML = '<p>暂无评论</p>';
                }
            } catch (error) {
                console.error('加载评论失败:', error);
                document.getElementById('comments').innerHTML = `<p style="color: red;">加载失败: ${error.message}</p>`;
            }
        }

        // 页面加载时执行
        window.onload = () => {
            console.log('页面加载完成，开始加载数据...');
            loadStats();
            loadComments();
        };
    </script>
</body>
</html>
